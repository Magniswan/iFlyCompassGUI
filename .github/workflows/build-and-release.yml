name: Build and Release MSIX

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Decode and verify PFX certificate
        shell: pwsh
        run: |
          $pfxPath = "$env:TEMP\iFlyCompassGUI.pfx"
          $certBytes = [Convert]::FromBase64String("${{ secrets.CERTIFICATE_PFX }}")
          [IO.File]::WriteAllBytes($pfxPath, $certBytes)
          Write-Output "CERTIFICATE_PATH=$pfxPath" >> $env:GITHUB_ENV
          Write-Output "PFX size: $($certBytes.Length) bytes"

          # Verify certificate can be imported and print details
          $certPassword = ConvertTo-SecureString -String "${{ secrets.CERTIFICATE_PASSWORD }}" -Force -AsPlainText
          try {
            $cert = Get-PfxCertificate -FilePath $pfxPath -Password $certPassword
            Write-Output "Certificate subject: $($cert.Subject)"
            Write-Output "Certificate issuer: $($cert.Issuer)"
            Write-Output "Certificate not before: $($cert.NotBefore)"
            Write-Output "Certificate not after: $($cert.NotAfter)"
            Write-Output "Certificate thumbprint: $($cert.Thumbprint)"
            if ($cert.NotAfter -lt (Get-Date)) {
              Write-Error "Certificate has EXPIRED on $($cert.NotAfter)!"
            }
          } catch {
            Write-Error "Failed to verify certificate: $_"
          }

      - name: Build MSIX (x64)
        shell: pwsh
        run: |
          $certPath = "$env:TEMP\iFlyCompassGUI.pfx"
          $certPassword = "${{ secrets.CERTIFICATE_PASSWORD }}"

          # Import certificate to CurrentUser\My store (required for MSIX signing)
          $securePassword = ConvertTo-SecureString -String $certPassword -Force -AsPlainText
          Import-PfxCertificate -FilePath $certPath -CertStoreLocation "Cert:\CurrentUser\My" -Password $securePassword

          dotnet publish -c Release -r win-x64 --self-contained false `
            /p:Platform=x64 `
            /p:AppxBundle=Never `
            /p:PackageCertificateKeyFile="$certPath" `
            /p:PackageCertificatePassword="$certPassword"

          # Find and rename the output MSIX
          $msixPath = Get-ChildItem -Path "bin\x64\Release\net8.0-windows10.0.19041.0\win-x64\AppPackages" -Filter "*.msix" -Recurse | Select-Object -First 1
          if (-not $msixPath) {
            # Fallback: search more broadly
            $msixPath = Get-ChildItem -Path "bin" -Filter "*.msix" -Recurse | Select-Object -First 1
          }
          if ($msixPath) {
            Write-Output "Found MSIX: $($msixPath.FullName)"
            $destPath = "iFlyCompassGUI_x64.msix"
            Copy-Item $msixPath.FullName $destPath
            Write-Output "MSIX_PATH=$destPath" >> $env:GITHUB_ENV
            Write-Output "MSIX_VERSION=$($msixPath.BaseName.Split('_')[-1])" >> $env:GITHUB_ENV
          } else {
            Write-Error "No MSIX file found after build!"
          }

      - name: Get version from tag
        id: get_version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          Write-Output "VERSION=$version" >> $env:GITHUB_ENV
          Write-Output "version=$version" >> $env:GITHUB_OUTPUT

      - name: Create or update GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: iFlyCompassGUI_x64.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate .appinstaller
        shell: pwsh
        run: |
          $version = "${{ env.VERSION }}"
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"

          $lines = @(
            '<?xml version="1.0" encoding="utf-8"?>',
            '<AppInstaller',
            '    Uri="https://{0}.github.io/{1}/iFlyCompassGUI.appinstaller"' -f $repo.Split('/')[0], $repo.Split('/')[1],
            '    Version="{0}"' -f $version,
            '    xmlns="http://schemas.microsoft.com/appx/appinstaller/2018">',
            '    <MainPackage',
            '        Name="iFlyCompassGUI"',
            '        Publisher="CN=Magniswan"',
            '        Version="{0}"' -f $version,
            '        ProcessorArchitecture="x64"',
            '        Uri="https://github.com/{0}/releases/download/{1}/iFlyCompassGUI_x64.msix" />' -f $repo, $tag,
            '    <UpdateSettings>',
            '        <OnLaunch HoursBetweenUpdateChecks="0" ShowPrompt="true" />',
            '    </UpdateSettings>',
            '</AppInstaller>'
          )
          Set-Content -Path "iFlyCompassGUI.appinstaller" -Value ($lines -join "`r`n")

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          name: 'github-pages'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
