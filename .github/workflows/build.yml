name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 1.2.3.0)'
        required: false
        type: string

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_XMLDOC_MODE: skip

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x86, x64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Decode PFX certificate
        run: |
          $pfxPath = Join-Path $env:GITHUB_WORKSPACE "cert\iFlyCompassGUI.pfx"
          New-Item -ItemType Directory -Path (Split-Path $pfxPath) -Force | Out-Null
          $bytes = [Convert]::FromBase64String("${{ secrets.PFX_BASE64 }}")
          [IO.File]::WriteAllBytes($pfxPath, $bytes)
          Write-Host "PFX written to: $pfxPath"

      - name: Import certificate to store
        run: |
          $pfxPath = Join-Path $env:GITHUB_WORKSPACE "cert\iFlyCompassGUI.pfx"
          $securePassword = ConvertTo-SecureString -String "${{ secrets.PFX_PASSWORD }}" -Force -AsPlainText
          Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation "Cert:\CurrentUser\My" -Password $securePassword | Out-Null

          # Get thumbprint for signing
          $cert = Get-ChildItem -Path "Cert:\CurrentUser\My" |
            Where-Object { $_.Subject -eq "CN=Magniswan" } |
            Sort-Object NotAfter -Descending |
            Select-Object -First 1
          Write-Host "Certificate thumbprint: $($cert.Thumbprint)"
          echo "CERT_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV

          # Export .cer for user installation
          $cerPath = Join-Path $env:GITHUB_WORKSPACE "cert\iFlyCompassGUI.cer"
          Export-Certificate -Cert $cert -FilePath $cerPath | Out-Null
          Write-Host "Exported .cer to: $cerPath"

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ -n "${{ github.ref_name }}" ]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="0.0.1"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build and package MSIX
        run: |
          dotnet msbuild iFlyCompassGUI.csproj `
            -t:Build `
            -p:Configuration=Release `
            -p:Platform=${{ matrix.platform }} `
            -p:AppxPackage=true `
            -p:GenerateAppxPackageOnBuild=true `
            -p:PackageCertificateThumbprint=$env:CERT_THUMBPRINT `
            -p:Version=${{ steps.version.outputs.version }}

      - name: Prepare release assets
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "release-output"
          New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null

          # Copy MSIX
          $msix = Get-ChildItem -Path "AppPackages" -Filter "iFlyCompassGUI*.msix" -Recurse |
            Select-Object -First 1
          if ($msix) {
            # Rename to include platform in filename
            $newName = $msix.Name -replace '\.msix$', "_${{ matrix.platform }}.msix"
            Copy-Item $msix.FullName -Destination (Join-Path $releaseDir $newName)
            Write-Host "Copied MSIX: $newName"
          }

          # Copy .cer for user installation (only from x64 build to avoid duplicates)
          if ("${{ matrix.platform }}" -eq "x64") {
            $cerPath = Join-Path $env:GITHUB_WORKSPACE "cert\iFlyCompassGUI.cer"
            if (Test-Path $cerPath) {
              Copy-Item $cerPath -Destination $releaseDir
              Write-Host "Copied CER: iFlyCompassGUI.cer"
            }

            # Copy install-cert.ps1
            $installScript = Join-Path $env:GITHUB_WORKSPACE "scripts\install-cert.ps1"
            if (Test-Path $installScript) {
              Copy-Item $installScript -Destination $releaseDir
              Write-Host "Copied install-cert.ps1"
            }
          }

          # List output
          Get-ChildItem $releaseDir | ForEach-Object {
            $sizeMB = [math]::Round($_.Length / 1MB, 2)
            Write-Host "  $($_.Name) ($sizeMB MB)"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iFlyCompassGUI-${{ steps.version.outputs.version }}-${{ matrix.platform }}
          path: release-output/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
            echo "Created and pushed tag: $TAG"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts/

      - name: Merge artifacts into release-output
        run: |
          mkdir -p release-output
          find all-artifacts/ -type f \( -name "*.msix" -o -name "*.cer" -o -name "*.ps1" \) -exec cp {} release-output/ \;
          echo "Release assets:"
          ls -lh release-output/

      - name: Generate release notes from commits
        id: release_notes
        shell: bash
        run: |
          CURRENT_TAG="v${{ steps.version.outputs.version }}"

          # Get the previous tag (excluding the current one)
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -1)

          echo "Current tag: $CURRENT_TAG"
          echo "Previous tag: ${PREV_TAG:-none (first release)}"

          # Build release notes
          {
            echo "RELEASE_NOTES<<EOF"
            echo "## What's Changed"
            echo ""

            if [ -n "$PREV_TAG" ]; then
              echo "Changes since \`$PREV_TAG\`:"
              echo ""
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges
            else
              echo "Initial release."
              git log --pretty=format:"- %s (%h)" --no-merges -20
            fi

            echo ""
            echo ""
            echo "---"
            echo ""
            echo "### Downloads"
            echo ""
            echo "| File | Architecture | Description |"
            echo "|------|-------------|-------------|"
            echo "| \`iFlyCompassGUI_*_x86.msix\` | x86 (32-bit) | For 32-bit Windows |"
            echo "| \`iFlyCompassGUI_*_x64.msix\` | x64 (64-bit) | For 64-bit Windows |"
            echo "| \`iFlyCompassGUI_*_arm64.msix\` | ARM64 | For ARM-based Windows devices |"
            echo "| \`iFlyCompassGUI.cer\` | - | Certificate (install before MSIX) |"
            echo ""
            echo "### Installation"
            echo ""
            echo "1. Download and install \`iFlyCompassGUI.cer\` (or run \`install-cert.ps1\`) to trust the signing certificate"
            echo "2. Download the MSIX package matching your CPU architecture"
            echo "3. Double-click the MSIX file to install"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: iFlyCompassGUI v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          files: release-output/*
