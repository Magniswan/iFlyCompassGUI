name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 1.2.3)'
        required: false
        type: string

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_XMLDOC_MODE: skip

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x86, x64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Decode PFX certificate
        run: |
          $pfxPath = Join-Path $env:GITHUB_WORKSPACE "cert\iFlyCompassGUI.pfx"
          New-Item -ItemType Directory -Path (Split-Path $pfxPath) -Force | Out-Null
          $bytes = [Convert]::FromBase64String("${{ secrets.PFX_BASE64 }}")
          [IO.File]::WriteAllBytes($pfxPath, $bytes)
          Write-Host "PFX written to: $pfxPath"

      - name: Import certificate to store
        run: |
          $pfxPath = Join-Path $env:GITHUB_WORKSPACE "cert\iFlyCompassGUI.pfx"
          $securePassword = ConvertTo-SecureString -String "${{ secrets.PFX_PASSWORD }}" -Force -AsPlainText
          Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation "Cert:\CurrentUser\My" -Password $securePassword | Out-Null

          # Get thumbprint for signing
          $cert = Get-ChildItem -Path "Cert:\CurrentUser\My" |
            Where-Object { $_.Subject -eq "CN=Magniswan" } |
            Sort-Object NotAfter -Descending |
            Select-Object -First 1
          Write-Host "Certificate thumbprint: $($cert.Thumbprint)"
          echo "CERT_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV

          # Export .cer for user installation
          $cerPath = Join-Path $env:GITHUB_WORKSPACE "cert\iFlyCompassGUI.cer"
          Export-Certificate -Cert $cert -FilePath $cerPath | Out-Null
          Write-Host "Exported .cer to: $cerPath"

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ -n "${{ github.ref_name }}" ]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="0.0.1"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Restore dependencies
        run: dotnet restore iFlyCompassGUI.csproj

      - name: Update manifest version
        run: |
          $version = "${{ steps.version.outputs.version }}"
          # MSIX version must be 4-part (e.g. 1.2.3.0)
          if ($version -notmatch '^\d+\.\d+\.\d+\.\d+$') {
            $version = "$version.0"
          }
          Write-Host "MSIX version: $version"
          echo "MSIX_VERSION=$version" >> $env:GITHUB_ENV

          $manifestPath = Join-Path $env:GITHUB_WORKSPACE "Package.appxmanifest"
          [xml]$manifest = Get-Content $manifestPath
          $manifest.Package.Identity.Version = $version
          $manifest.Save($manifestPath)
          Write-Host "Updated Package.appxmanifest version to $version"

      - name: Build and package MSIX
        run: |
          dotnet build iFlyCompassGUI.csproj `
            -c Release `
            -r win-${{ matrix.platform }} `
            -p:Platform=${{ matrix.platform }} `
            -p:AppxPackage=true `
            -p:GenerateAppxPackageOnBuild=true `
            -p:PackageCertificateThumbprint=$env:CERT_THUMBPRINT `
            -p:Version=$env:MSIX_VERSION `
            -p:ApplicationDisplayVersion=$env:MSIX_VERSION `
            -p:PackageVersion=$env:MSIX_VERSION

      - name: Prepare release assets
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "release-output"
          New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null

          # Copy MSIX
          $msix = Get-ChildItem -Path "AppPackages" -Filter "iFlyCompassGUI*.msix" -Recurse |
            Select-Object -First 1
          if ($msix) {
            # Rename to 3-part version format: iFlyCompassGUI_1.0.0_x64.msix
            $version = "${{ steps.version.outputs.version }}"
            $newName = $msix.Name -replace '_\d+\.\d+\.\d+\.\d+_', "_${version}_"
            Copy-Item $msix.FullName -Destination (Join-Path $releaseDir $newName)
            Write-Host "Copied MSIX: $newName"
          }

          # Copy .cer for user installation (only from x64 build to avoid duplicates)
          if ("${{ matrix.platform }}" -eq "x64") {
            $cerPath = Join-Path $env:GITHUB_WORKSPACE "cert\iFlyCompassGUI.cer"
            if (Test-Path $cerPath) {
              Copy-Item $cerPath -Destination $releaseDir
              Write-Host "Copied CER: iFlyCompassGUI.cer"
            }

            # Copy install-cert.ps1
            $installScript = Join-Path $env:GITHUB_WORKSPACE "scripts\install-cert.ps1"
            if (Test-Path $installScript) {
              Copy-Item $installScript -Destination $releaseDir
              Write-Host "Copied install-cert.ps1"
            }
          }

          # List output
          Get-ChildItem $releaseDir | ForEach-Object {
            $sizeMB = [math]::Round($_.Length / 1MB, 2)
            Write-Host "  $($_.Name) ($sizeMB MB)"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iFlyCompassGUI-${{ steps.version.outputs.version }}-${{ matrix.platform }}
          path: release-output/

  build-installer:
    needs: build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: iFlyCompassGUI-${{ steps.version.outputs.version }}-x64
          path: msix-artifact/

      - name: Decode PFX certificate
        shell: pwsh
        run: |
          New-Item -Path "cert" -ItemType Directory -Force | Out-Null
          $pfxBytes = [Convert]::FromBase64String("${{ secrets.PFX_BASE64 }}")
          [IO.File]::WriteAllBytes("cert\iFlyCompassGUI.pfx", $pfxBytes)

      - name: Create cert-password.props
        shell: pwsh
        run: |
          @"
          <Project>
            <PropertyGroup>
              <PackageCertificateKeyFile>cert\iFlyCompassGUI.pfx</PackageCertificateKeyFile>
              <PackageCertificatePassword>${{ secrets.PFX_PASSWORD }}</PackageCertificatePassword>
            </PropertyGroup>
          </Project>
          "@ | Out-File -FilePath "cert\cert-password.props" -Encoding utf8

      - name: Resolve .NET 10 Runtime download URL
        id: dotnet-url
        shell: pwsh
        run: |
          try {
            $releases = Invoke-RestMethod "https://dotnetcli.azureedge.net/dotnet/release-metadata/10.0/releases.json"
            $latestRelease = $releases.releases | Select-Object -First 1
            $runtimeAsset = $latestRelease."windowsdesktop".files |
              Where-Object { $_.rid -eq "win-x64" -and $_.name -like "windowsdesktop-runtime-*" } |
              Select-Object -First 1
            if (-not $runtimeAsset) {
              $runtimeAsset = $latestRelease."windowsdesktop".files |
                Where-Object { $_.name -like "*windowsdesktop-runtime*win-x64*" } |
                Select-Object -First 1
            }
            if ($runtimeAsset) {
              echo "url=$($runtimeAsset.url)" >> $env:GITHUB_OUTPUT
              Write-Host "Resolved .NET Runtime URL: $($runtimeAsset.url)"
            } else {
              Write-Warning "Could not resolve .NET Runtime URL"
              echo "url=" >> $env:GITHUB_OUTPUT
            }
          } catch {
            Write-Warning "Failed to query dotnet release API: $_"
            echo "url=" >> $env:GITHUB_OUTPUT
          }

      - name: Prepare resources and build installer
        shell: pwsh
        run: |
          $resourcesDir = "installer\Bootstrapper\Resources"
          New-Item -Path $resourcesDir -ItemType Directory -Force | Out-Null

          # Copy MSIX from artifact
          $msix = Get-ChildItem -Path "msix-artifact" -Filter "*.msix" | Select-Object -First 1
          if ($msix) {
            Copy-Item $msix.FullName "$resourcesDir\iFlyCompassGUI.msix" -Force
            Write-Host "Copied MSIX: $($msix.Name)"
          } else {
            Write-Error "No MSIX found in artifact"
            exit 1
          }

          # Export CER from PFX
          $cert = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2(
            "cert\iFlyCompassGUI.pfx", "${{ secrets.PFX_PASSWORD }}")
          [IO.File]::WriteAllBytes("$resourcesDir\iFlyCompassGUI.cer", $cert.Export("Cert"))
          Write-Host "Exported CER certificate"

          # Update .NET Runtime URL in source
          $dotnetUrl = "${{ steps.dotnet-url.outputs.url }}"
          if ($dotnetUrl) {
            $urlsFile = "installer\Bootstrapper\RuntimeUrls.cs"
            $content = Get-Content $urlsFile -Raw
            $content = $content -replace 'PLACEHOLDER_DOTNET_RUNTIME_URL', $dotnetUrl
            Set-Content $urlsFile $content -NoNewline
            Write-Host "Updated .NET Runtime URL"
          }

          # Build Bootstrapper
          dotnet build installer\Bootstrapper\Bootstrapper.csproj -c Release
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Bootstrapper build failed"
            exit 1
          }

          # Collect output
          $setupExe = Get-ChildItem -Path "installer\Bootstrapper\bin\Release" -Filter "iFlyCompassGUI-Setup.exe" -Recurse |
            Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $setupExe) {
            Write-Error "Setup EXE not found"
            exit 1
          }

          $releaseDir = "installer-output"
          New-Item -Path $releaseDir -ItemType Directory -Force | Out-Null
          Copy-Item $setupExe.FullName "$releaseDir\iFlyCompassGUI-Setup.exe" -Force
          Write-Host "Installer output: $($setupExe.FullName)"
          Write-Host "Size: $([math]::Round($setupExe.Length / 1MB, 1)) MB"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: iFlyCompassGUI-installer-${{ steps.version.outputs.version }}
          path: installer-output/

  release:
    needs: [build, build-installer]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
            echo "Created and pushed tag: $TAG"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts/

      - name: Merge artifacts into release-output
        run: |
          mkdir -p release-output
          find all-artifacts/ -type f \( -name "*.msix" -o -name "*.cer" -o -name "*.ps1" -o -name "*.exe" \) -exec cp {} release-output/ \;
          echo "Release assets:"
          ls -lh release-output/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: iFlyCompassGUI v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-output/*
